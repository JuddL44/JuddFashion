<div class="home-container">
  <section class="hero">
    <div class="hero-content">
      <h1>{{ heroTitle }}</h1>
      <p>{{ heroSubtitle }}</p>
      <div class ="cta-button-container">
        <button class="cta-button" routerLink="/shop">Shop Now</button>
        <button class="cta-button">My Account</button>
        <button class="cta-button" routerLink="/about">About Site</button>
      </div>
    </div>
  </section>


  <section class="featured">
    <h2>Featured Items : {{ featuredProducts.length }}</h2>
    @if(!isLoading) {
    <div class="featured-grid">
    <div class="product-card" *ngFor="let product of featuredProducts; let i = index">
      <img [src]="product.imageUrl" [alt]="product.name" />

      <div class="product-info">
        <h3>{{ product.name }}</h3>
        <p>{{ product.description }}</p>
        <button class="view-button">View Item</button>
      </div>
    </div>
  </div>
  }
  @else {
  <div class="spinner-container">
    <div class="spinner"></div>
  </div>
}
  </section>
  
</div>
